name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Playdate SDK
        run: |
          wget -q https://download.panic.com/playdate_sdk/Linux/PlaydateSDK-latest.tar.gz
          tar -xzf PlaydateSDK-latest.tar.gz
          SDK_DIR=$(find . -maxdepth 1 -name "PlaydateSDK-*" -type d | head -1)
          echo "PLAYDATE_SDK_PATH=$GITHUB_WORKSPACE/$SDK_DIR" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/$SDK_DIR/bin" >> "$GITHUB_PATH"

      - name: Build
        run: pdc source/ ghostwood-approach.pdx

      - name: Package
        run: zip -r "ghostwood-approach-${{ github.ref_name }}.zip" ghostwood-approach.pdx

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "ghostwood-approach-${{ github.ref_name }}.zip"
          generate_release_notes: true
